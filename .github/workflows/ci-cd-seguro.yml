name: CI/CD Pipeline Maximizado con Seguridad Enterprise

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1. Setup de Entornos
      - name: Setup Node.js (Frontend & Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias y plugins de seguridad
        run: |
          npm install
          npm install --save-dev eslint-plugin-security eslint-plugin-no-unsanitized npm-audit-ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias Python
        run: pip install -r requirements.txt bandit safety

      # 2. Análisis Estático de Seguridad (SAST Avanzado)
      - name: Linting de Seguridad JS/Node (Detecta XSS y Sanitización)
        run: |
          npx eslint . --ext .js,.jsx --plugin security --plugin no-unsanitized --rule 'no-unsanitized/method: error, no-unsanitized/property: error'

      - name: Análisis de Seguridad Python con Bandit (Detecta Inyecciones)
        run: bandit -r . -f json -o bandit_report.json

      # 3. Escaneo de Secretos (Evita fuga de credenciales de DB/APIs)
      - name: Escaneo de Secrets con TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # 4. Semgrep Configurado para OWASP y Cabeceras
      - name: Semgrep Security Scan (XSS, CORS, Rate Limiting)
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/owasp-top-ten, p/javascript, p/expressjs, p/nodejs"
          generateSarif: true

      # 5. Auditoría de Dependencias Estricta (Supply Chain Attacks)
      - name: Auditoría de Dependencias (NPM & PIP)
        run: |
          npx npm-audit-ci --moderate
          safety check --json > safety_report.json

      # 6. Verificación de Integridad de Código (SonarQube)
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ./

      # 7. Análisis Dinámico (DAST) - Verificación de Cabeceras HTTP
      - name: Levantar servidor local para test DAST
        run: |
          npm start & 
          sleep 10
        env:
          NODE_ENV: test

      - name: OWASP ZAP Baseline Scan (Verifica Headers, CSP, HSTS)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: true
          rules_file_name: '.zap/rules.tsv'

      # 8. Reportes y Bloqueos
      - name: Generar Reporte Unificado de Seguridad
        if: always()
        run: |
          echo "# Reporte de Seguridad Ciberseguridad - $(date)" > reporte.md
          echo "## SAST y Sanitización" >> reporte.md
          cat bandit_report.json >> reporte.md
          echo "Estado General: Revisar artefactos para detalles completos." >> reporte.md

      - name: Subir Reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-seguridad
          path: reporte.md

      # 9. Notificación de Brechas
      - name: Alerta en Slack de Vulnerabilidad Crítica
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: "{\"text\": \"🚨 ALERTA GITHUB ACTIONS: Pipeline de Seguridad Falló. Código con posibles vulnerabilidades bloqueado antes de producción.\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
